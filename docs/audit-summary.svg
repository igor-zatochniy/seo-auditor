<svg xmlns="http://www.w3.org/2000/svg" width="980" height="650" viewBox="0 0 980 650" role="img" aria-labelledby="title desc">
  <title id="title">SEO Auditor audit summary table</title>
  <desc id="desc">A visual audit summary for https://example.com with status, metadata, robots, image, link, and issue signals.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fa; }
      .panel { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
      .header { fill: #24292f; }
      .muted { fill: #57606a; }
      .text { fill: #24292f; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #24292f; font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
      .line { stroke: #d8dee4; stroke-width: 1; }
      .row-alt { fill: #f6f8fa; }
      .ok-bg { fill: #dafbe1; }
      .ok-text { fill: #116329; }
      .warn-bg { fill: #fff8c5; }
      .warn-text { fill: #7d4e00; }
      .issue-bg { fill: #ffebe9; }
      .issue-text { fill: #cf222e; }
      .info-bg { fill: #ddf4ff; }
      .info-text { fill: #0969da; }
    </style>
  </defs>

  <rect class="bg" width="980" height="650" rx="0" />
  <rect class="panel" x="38" y="34" width="904" height="582" rx="8" />

  <text class="text header" x="66" y="78" font-size="24" font-weight="700">Audit summary</text>
  <text class="mono muted" x="66" y="106" font-size="14">https://example.com</text>
  <rect x="790" y="56" width="106" height="30" rx="15" class="ok-bg" />
  <text class="text ok-text" x="821" y="76" font-size="13" font-weight="700">200 OK</text>

  <line class="line" x1="66" y1="128" x2="914" y2="128" />
  <text class="text muted" x="78" y="156" font-size="12" font-weight="700">METRIC</text>
  <text class="text muted" x="328" y="156" font-size="12" font-weight="700">VALUE</text>
  <text class="text muted" x="760" y="156" font-size="12" font-weight="700">SIGNAL</text>
  <line class="line" x1="66" y1="172" x2="914" y2="172" />

  <g>
    <rect class="row-alt" x="66" y="172" width="848" height="42" />
    <text class="text" x="78" y="198" font-size="14">Status</text>
    <text class="mono" x="328" y="198" font-size="14">200 OK</text>
    <rect x="750" y="183" width="82" height="22" rx="11" class="ok-bg" />
    <text class="text ok-text" x="777" y="199" font-size="12" font-weight="700">OK</text>
  </g>

  <g>
    <text class="text" x="78" y="240" font-size="14">Title</text>
    <text class="mono" x="328" y="240" font-size="14">Example Domain</text>
    <rect x="750" y="225" width="104" height="22" rx="11" class="warn-bg" />
    <text class="text warn-text" x="771" y="241" font-size="12" font-weight="700">Too Short</text>
  </g>

  <g>
    <rect class="row-alt" x="66" y="256" width="848" height="42" />
    <text class="text" x="78" y="282" font-size="14">Description</text>
    <text class="mono muted" x="328" y="282" font-size="14">[Missing]</text>
    <rect x="750" y="267" width="98" height="22" rx="11" class="issue-bg" />
    <text class="text issue-text" x="773" y="283" font-size="12" font-weight="700">Issue</text>
  </g>

  <g>
    <text class="text" x="78" y="324" font-size="14">H1</text>
    <text class="mono" x="328" y="324" font-size="14">Example Domain</text>
    <rect x="750" y="309" width="82" height="22" rx="11" class="ok-bg" />
    <text class="text ok-text" x="777" y="325" font-size="12" font-weight="700">OK</text>
  </g>

  <g>
    <rect class="row-alt" x="66" y="340" width="848" height="42" />
    <text class="text" x="78" y="366" font-size="14">Canonical</text>
    <text class="mono muted" x="328" y="366" font-size="14">[Missing]</text>
    <rect x="750" y="351" width="98" height="22" rx="11" class="issue-bg" />
    <text class="text issue-text" x="773" y="367" font-size="12" font-weight="700">Issue</text>
  </g>

  <g>
    <text class="text" x="78" y="408" font-size="14">Robots</text>
    <text class="mono" x="328" y="408" font-size="14">robots.txt: Allowed, meta: [Missing]</text>
    <rect x="750" y="393" width="82" height="22" rx="11" class="ok-bg" />
    <text class="text ok-text" x="777" y="409" font-size="12" font-weight="700">OK</text>
  </g>

  <g>
    <rect class="row-alt" x="66" y="424" width="848" height="42" />
    <text class="text" x="78" y="450" font-size="14">X-Robots-Tag</text>
    <text class="mono muted" x="328" y="450" font-size="14">[Missing]</text>
    <rect x="750" y="435" width="82" height="22" rx="11" class="info-bg" />
    <text class="text info-text" x="773" y="451" font-size="12" font-weight="700">Info</text>
  </g>

  <g>
    <text class="text" x="78" y="492" font-size="14">Images without alt</text>
    <text class="mono" x="328" y="492" font-size="14">0 / 0</text>
    <rect x="750" y="477" width="82" height="22" rx="11" class="ok-bg" />
    <text class="text ok-text" x="777" y="493" font-size="12" font-weight="700">OK</text>
  </g>

  <g>
    <rect class="row-alt" x="66" y="508" width="848" height="42" />
    <text class="text" x="78" y="534" font-size="14">Links</text>
    <text class="mono" x="328" y="534" font-size="14">internal: 0, external: 1, total: 1</text>
    <rect x="750" y="519" width="82" height="22" rx="11" class="info-bg" />
    <text class="text info-text" x="773" y="535" font-size="12" font-weight="700">Info</text>
  </g>

  <line class="line" x1="66" y1="562" x2="914" y2="562" />
  <text class="text issue-text" x="78" y="592" font-size="14" font-weight="700">Issues:</text>
  <text class="text" x="132" y="592" font-size="14">short title, missing description, missing canonical, no JSON-LD, thin content</text>
</svg>
